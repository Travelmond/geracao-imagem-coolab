

services:
  colab-sim:
    build: .
    runtime: nvidia
    tty: true
    stdin_open: true
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      # Notebook principal
      - ../DiffusionUI.ipynb:/content/DiffusionUI.ipynb
      # Extensão cache-manager
      - ../cache-manager:/content/cache-manager
      # Volume persistente — simula o Google Drive
      - ./drive-data:/content/drive/MyDrive/Stable_Diffusion_Dados
    ports:
      - "7860:7860"
    shm_size: "8g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
